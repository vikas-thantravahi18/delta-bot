# =====================================================================
# ut_stc on ETHUSD 4h  — leg 2 of the two-strategy portfolio.
# Wallet split: this strategy manages 50% of the account.
# Risk: 5% of that 50% share per trade (= 2.5% of the full wallet).
# Runs alongside config.v2_btc.yaml via scripts/run_portfolio.py.
# DRY-RUN by default — set live.dry_run: false to trade real money.
# ut_stc is a VALIDATED strategy (ETH-only; dead on BTC).
# =====================================================================

exchange:
  region: india

market:
  symbol: ETHUSD
  resolution: "4h"        # ut_stc is validated on 4h
  trend_resolution: "1d"  # unused (ut_stc computes its own trend internally)
  lot_size: 0.01          # Delta ETHUSD: 1 lot = 0.01 ETH
  min_lots: 1

account:
  starting_balance: 100.0  # fallback only; live sizing reads the API balance

risk:
  capital_allocation_pct: 0.50   # this strategy's 50% share of the wallet
  risk_per_trade_usd: null
  risk_per_trade_pct: 0.05       # 5% of the 50% share  (= 2.5% of full wallet)
  reward_risk_ratio: 3.0         # RR 1:3 (validated)
  max_trades_per_day: 2          # ut_stc is slow (~1 trade/wk); a low cap is fine
  max_open_positions: 1
  max_leverage: 10
  trail_distance_r: null

strategy:
  name: ut_stc
  params:
    ut_key: 2.0
    atr_period: 1
    stc_len: 80
    macd_fast: 27
    macd_slow: 50
    zone: 25
    flip_window: 2
    swing: 10

backtest:
  fee_rate: 0.0005
  slippage_rate: 0.0002
  results_dir: results

live:
  dry_run: false                 # LIVE — real orders (still gated by --live confirmation)
  poll_seconds: 60
  order_type: market_order
