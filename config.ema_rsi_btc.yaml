# =====================================================================
# ema_rsi_atr on BTCUSD 30m  — leg 3 (the added BTC frequency leg).
# Shares the ONE BTC position slot with v2 (config.v2_btc.yaml): a
# per-market lock lets whichever fires first take the slot; the other
# skips while BTC is occupied, so there is never a double BTC entry.
# Params are the robust multi-timeframe pick from scripts/optimize.py
# (positive on 3m/6m/1y/2y AND both train/OOS halves of 2y BTCUSD).
# Runs alongside config.v2_btc.yaml + config.ut_stc_eth.yaml via run_all.py.
# DRY-RUN gated by --live; set live.dry_run: false to trade real money.
# =====================================================================

exchange:
  region: india

market:
  symbol: BTCUSD
  resolution: "30m"       # ema_rsi is validated/optimized on 30m (~2 trades/week)
  trend_resolution: "4h"  # unused when use_higher_tf_filter is false
  lot_size: 0.001         # Delta BTCUSD: 1 lot = 0.001 BTC
  min_lots: 1

account:
  starting_balance: 100.0  # fallback only; live sizing reads the API balance

risk:
  capital_allocation_pct: 0.50   # MARGIN mode: deploy 50% of the wallet AS MARGIN per BTC trade
  sizing_mode: margin            # big, fixed-notional positions. Per-trade risk ~20-27% of wallet
                                  #   with the strategy's native stop -- user manages exits manually.
                                  #   (shares the BTC slot with v2 -- only one BTC position at a time)
  risk_per_trade_usd: 3.0        # ignored in margin mode (fallback if switched back to sizing_mode: risk)
  risk_per_trade_pct: null
  reward_risk_ratio: 3.0         # RR 1:3 (backtest-confirmed; do not lower w/o re-testing)
  max_trades_per_day: 3
  max_open_positions: 1
  max_leverage: 10
  trail_distance_r: null         # trailing OFF — trend winners need room

strategy:
  name: ema_rsi_atr
  params:
    ema_fast: 13                 # robust 30m pick
    ema_slow: 100                # robust 30m pick
    ema_trend: 200
    rsi_period: 14
    rsi_long_min: 50
    rsi_short_max: 50
    rsi_overbought: 75
    rsi_oversold: 25
    atr_period: 14
    atr_stop_mult: 3.0           # wide, volatility-aware stop
    use_higher_tf_filter: false  # off gave a more consistent edge on 30m

backtest:
  fee_rate: 0.0005
  slippage_rate: 0.0002
  results_dir: results

live:
  dry_run: false                 # LIVE — real orders (still gated by --live confirmation)
  poll_seconds: 60
  order_type: market_order
